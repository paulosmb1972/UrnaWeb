<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UrnaWeb Digital</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="lang-box">
        <button onclick="window.TR('pt')"><img src="https://flagcdn.com/w80/br.png"></button>
        <button onclick="window.TR('en')"><img src="https://flagcdn.com/w80/us.png"></button>
        <button onclick="window.TR('es')"><img src="https://flagcdn.com/w80/es.png"></button>
    </div>

    <div id="login" class="screen active">
        <button onclick="window.LIMPAR()" id="B_CACHE" style="background:none; border:1px solid rgba(255,255,255,0.3); font-size:11px; padding:10px; margin-top:20px; color:#ccc;"></button>
        <h2 id="L1_1"></h2>
        <div class="info-box"><b id="H_LOGIN_TIT"></b><span id="H_LOGIN_TXT"></span></div>
        <input id="uE" type="email">
        <button onclick="window.V()" id="L2"></button>
    </div>

    <div id="verify" class="screen">
        <h2 id="L1_2"></h2>
        <div class="info-box"><b id="H_VERIFY_TIT"></b><span id="H_VERIFY_TXT"></span></div>
        <input id="iC" type="text" maxlength="4" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
        <button onclick="window.C()" id="V3"></button>
    </div>

    <div id="setup" class="screen">
        <h2 id="L1_3"></h2>
        <div class="info-box"><b id="H_SETUP_TIT"></b><span id="H_SETUP_TXT"></span></div>
        <input id="tE" type="text">
        <input id="maxV" type="number" min="1" value="1">
        <button onclick="window.N()" id="S2"></button>
    </div>

    <div id="pay" class="screen">
    <h2 id="P1">Pagamento</h2>
   <!-- OPÇÃO COMPLEMENTAR: CHAVE PIX DIRETA -->
        <div class="pay-card" style="border: 2px solid #1fa997; background: rgba(31, 169, 151, 0.1); margin-bottom: 20px; padding: 15px; border-radius: 8px;">
            <h3 style="color:#1fa997; margin:0 0 5px 0;"><i class="fa-solid fa-pix"></i> Pague Rápido via PIX</h3>
            <p style="font-size:13px; margin:5px 0;">Chave Celular: <strong style="font-size:16px; color:#fff; background:#222; padding:2px 6px; border-radius:4px; user-select:all;">81999491651</strong></p>
            <span style="font-size:11px; display:block; margin-top:5px; color:#aaa;">Transfira o valor do seu plano (R$ 30 ou R$ 500) e envie o comprovante no botão abaixo para receber seu código de liberação.</span>
            <button onclick="window.open('https://wa.me/5581999491651?text=Olá Paulo, fiz o Pix para liberar meu acesso no UrnaWeb. Segue o comprovante.')" style="margin-top:10px; background:#25d366; color:white; width:100%; font-weight:bold; border:none; padding:10px; border-radius:5px; cursor:pointer;"><i class="fa-brands fa-whatsapp"></i> Enviar Comprovante via WhatsApp</button>
        </div>
    
    <div class="pay-card">
        <h3 id="PL1">Taxa Administrativa</h3>
        <span style="font-size:28px; color:var(--accent); font-weight:bold;">R$ 30,00</span>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button onclick="window.open('https://mpago.la/2maEAFx')" id="B1" style="flex:1;">Mercado Pago</button>
            <button onclick="window.open('https://www.paypal.com/paypalme/SEU_USUARIO/30brl')" style="flex:1; background:#003087; color:white;">PayPal</button>
        </div>
    </div>

    <div class="pay-card">
        <h3 id="PL2">Cota de Serviço</h3>
        <span style="font-size:28px; color:var(--success); font-weight:bold;">R$ 500,00</span>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button onclick="window.open('https://mpago.la/1VakcdN')" id="B2" style="flex:1;">Mercado Pago</button>
            <button onclick="window.open('https://www.paypal.com/paypalme/SEU_USUARIO/500brl')" style="flex:1; background:#003087; color:white;">PayPal</button>
        </div>
    </div>

    <div class="pay-card" style="border: 2px solid var(--accent);">
        <p id="L_CUP"></p><input id="cup" type="text">
        <button onclick="window.VALIDAR_TOKEN_MANUAL()" id="P2" style="background:var(--accent); color:#000; font-weight:bold;">Validar Código</button>
    </div>
    <button onclick="window.GO('login')" id="B_VOLTAR" style="background:none; border:1px solid #fff;">Voltar</button>
</div>
    
    <div id="setupCargo" class="screen">
        <h2 id="C1"></h2>
        <div class="info-box"><b id="H_CARGO_TIT"></b><span id="H_CARGO_TXT"></span></div>
        <input id="nC" type="text">
        <input id="nCand" type="text">
        <div class="foto-container" onclick="document.getElementById('fileIn').click()">
            <span id="INSTR_FOTO"></span>
            <img id="imgPrev" class="img-preview">
        </div>
        <input type="file" id="fileIn" hidden accept="image/*" onchange="window.PREV(this)">
        <button onclick="window.A()" id="C2"></button>
        <div id="listaTemporaria" class="cand-preview-list"></div>
        <button onclick="window.SAVE()" id="C3" style="background:var(--success)"></button>
        <button onclick="window.START_VOTE_PROCESS()" id="C4"></button>
    </div>

    <div id="urna" class="screen">
        <h2 id="uT"></h2>
        <div class="info-box"><b id="H_URNA_TIT"></b><span id="H_URNA_TXT"></span></div>
        <div id="gridUrna" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 20px;"></div>
        <button onclick="window.VOTE()" id="U1" style="height:80px; background:var(--success); margin-bottom: 20px;"></button>
        <button onclick="window.BRANCO()" id="BT_BRANCO" style="height:60px; background:#ffffff; color:#333; margin-bottom: 20px; border: 2px solid #ccc;"></button>
        <div class="voter-counter-box">
            <span id="L_COUNT"></span>
            <b id="voterCountDisplay">0</b>
        </div>
        <button onclick="window.CONFIRM_END()" id="U2" style="background:var(--danger); opacity: 0.6; font-size: 12px; padding: 10px; margin-top: 80px;"></button>
    </div>

    <div id="res" class="screen">
        <h2 id="R_TITLE"></h2>
        <div id="areaImpressao" style="display:none;">
    <div id="pC" style="background: #fff; color: #000;"></div>
</div>
        <button onclick="window.PDF(false)" id="B_PDF_SIMPLE"></button>
        <button onclick="window.PDF(true)" id="B_PDF_PHOTOS" style="background:var(--success)"></button>
        <div style="margin-top:30px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
            <div class="info-box"><b id="H_FEED_TIT"></b><span id="H_FEED_TXT"></span></div>
            <textarea id="txtSugestao"></textarea>
            <button onclick="window.FEED()" id="F2"></button>
        </div>
        <button onclick="window.RESET_TOTAL_E_LOGOUT()" id="B_EXIT_FINAL" style="background:var(--danger); padding: 15px; width: 100%; color: #fff; font-weight: bold; margin-top: 20px; border: none; border-radius: 8px;">Sair e Iniciar Nova Eleição</button>    </div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="assets/js/config.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
  // ==================== CONTROLE DE SEGURANÇA E TOKENS MANUAIS ====================
        const tokensAvulsos = ["LIBERAR30", "URNA30WEB", "CARUARUPIX", "IGREJA30"];
        const tokensPacote20 = ["PACOTE20X", "ESCOLA500", "CONCILIO20", "PREMIUM500"];

        // Função executada quando o usuário digita o token na tela de pagamento original
        window.VALIDAR_TOKEN_MANUAL = function() {
            const campoCupom = document.getElementById("cup");
            if (!campoCupom) return;
            
            const tokenDigitado = campoCupom.value.trim().toUpperCase();
            
            if (tokensAvulsos.includes(tokenDigitado)) {
                alert("Sucesso! Plano Avulso Ativado. Urna liberada para esta eleição.");
                if (typeof window.K === 'function') { window.K(); } 
                if (typeof window.GO === 'function') { window.GO('setupCargo'); } 
                return;
            } 
            
            if (tokensPacote20.includes(tokenDigitado)) {
                alert("Sucesso! Crédito do Pacote Ativado. Esta eleição está liberada.");
                if (typeof window.K === 'function') { window.K(); }
                if (typeof window.GO === 'function') { window.GO('setupCargo'); }
                return;
            }
            
            if (typeof window.K === 'function') { 
                window.K(); 
            } else {
                alert("Código inválido. Verifique o texto ou entre em contato com o suporte.");
            }
        };

        // INTERCEPTADOR: Monitora se a contagem chega a 10 e garante o redirecionamento
        function iniciarMonitoramentoVotos() {
            const alvoContador = document.getElementById("voterCountDisplay");
            if (!alvoContador) {
                setTimeout(iniciarMonitoramentoVotos, 500);
                return;
            }

            const observador = new MutationObserver(function(mutations) {
                mutations.forEach(function() {
                    const contagemAtual = parseInt(alvoContador.innerText) || 0;
                    if (contagemAtual >= 10 && typeof window.GO === 'function') {
                        window.GO('pay');
                    }
                });
            });

            observador.observe(alvoContador, { childList: true, characterData: true, subtree: true });
        }
        iniciarMonitoramentoVotos();
        // ==================== FIM DO BLOCO DE SEGURANÇA ====================

        // Inicialização do EmailJS
        (function() {
            if (window._cfg && window._cfg.k) {
                emailjs.init(window._cfg.k); 
            }
        })();

        // Função de inicialização do sistema original
        function initSystem() {
            console.log("Checando funções...");
            if (typeof window.GO === 'function' && typeof window.TR === 'function') {
                window.TR('pt'); 
                window.GO('login'); 
                console.log("UrnaWeb Ativa!");
            } else {
                console.log("Aguardando scripts...");
                setTimeout(initSystem, 300);
            }
        }
        window.onload = initSystem;
    </script>
        </body>
</html>
